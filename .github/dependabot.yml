# Dependabot keeps pinned action and hook versions up to date.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Pinned GitHub Actions used in .github/workflows/.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions
